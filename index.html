<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>電影探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.14);
  --text: #f0ede6; --muted: #8a8799; --accent: #e8c97a;
  --danger: #e87a7a; --success: #7ae8b0;
  --font-serif: 'Noto Serif TC', serif; --font-mono: 'DM Mono', monospace;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: var(--font-serif); min-height: 100vh; overflow-x: hidden; }
body::before {
  content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999; opacity: 0.5;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}

/* ── LOGIN ── */
.login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 2rem; }
.login-overlay.hidden { display: none; }
.login-box { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 10px; width: 100%; max-width: 380px; overflow: hidden; }
.login-top { padding: 2.5rem 2rem 1.5rem; text-align: center; border-bottom: 0.5px solid var(--border); }
.login-icon { font-size: 36px; display: block; margin-bottom: 1rem; }
.login-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; color: var(--muted); }
.login-body { padding: 1.75rem 2rem 2rem; display: flex; flex-direction: column; gap: 1rem; }
.login-group { display: flex; flex-direction: column; gap: 6px; }
.login-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
.login-input { background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 6px; padding: 10px 14px; font-family: var(--font-serif); font-size: 14px; color: var(--text); outline: none; transition: border-color 0.2s; width: 100%; }
.login-input:focus { border-color: var(--accent); }
.login-error { font-size: 12px; color: var(--danger); text-align: center; min-height: 16px; font-family: var(--font-mono); }
.login-btn { background: var(--accent); border: none; border-radius: 6px; padding: 11px; font-family: var(--font-serif); font-size: 14px; font-weight: 700; color: #0a0a0f; cursor: pointer; transition: opacity 0.2s; width: 100%; margin-top: 4px; }
.login-btn:hover { opacity: 0.85; }
.login-btn:active { transform: scale(0.98); }
.login-footer { padding: 1rem 2rem; border-top: 0.5px solid var(--border); text-align: center; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; color: var(--muted); }

/* ── NAV ── */
.nav { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 2rem; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: rgba(10,10,15,0.9); backdrop-filter: blur(12px); z-index: 50; }
.nav-logo { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.15em; color: var(--accent); cursor: pointer; transition: opacity 0.2s; background: none; border: none; }
.nav-logo:hover { opacity: 0.75; }
.nav-tabs { display: flex; gap: 4px; }
.nav-tabs.hidden-tabs { display: none; }
.nav-tab { background: transparent; border: 0.5px solid transparent; border-radius: 6px; padding: 6px 14px; font-family: var(--font-serif); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.nav-tab:hover { color: var(--text); border-color: var(--border2); }
.nav-tab.active { background: var(--surface2); color: var(--text); border-color: var(--border2); }
.nav-back { display: none; font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.08em; color: var(--muted); cursor: pointer; background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; padding: 6px 14px; transition: all 0.2s; white-space: nowrap; }
.nav-back:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
.nav-back.visible { display: block; }

/* ── PAGES ── */
.page { display: none; }
.page.active { display: block; }

/* ══════════════════════════════
   FRONT-END
══════════════════════════════ */
header {
  position: relative; padding: 5rem 2rem 3.5rem; text-align: center; overflow: hidden;
}
header::before {
  content: ''; position: absolute; top: -40%; left: 50%; transform: translateX(-50%);
  width: 700px; height: 500px; background: radial-gradient(ellipse, rgba(232,201,122,0.08) 0%, transparent 70%); pointer-events: none;
}
.site-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.25em; color: var(--accent); display: block; margin-bottom: 1.2rem; }
h1 { font-size: clamp(2.5rem, 7vw, 5.5rem); font-weight: 700; letter-spacing: -0.02em; line-height: 1.05; }
h1 span { color: var(--accent); }
.header-sub { margin-top: 1rem; font-size: 15px; color: var(--muted); }
.header-line { width: 40px; height: 1px; background: var(--accent); margin: 1.75rem auto 0; }

.filters-wrap { padding: 0 2rem 2.5rem; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
.filter-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.15em; color: var(--muted); margin-right: 4px; }
.filter-btn { background: transparent; border: 0.5px solid var(--border2); border-radius: 100px; padding: 6px 16px; font-family: var(--font-serif); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.filter-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }
.filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0a0a0f; font-weight: 600; }

.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1.5px; max-width: 1400px; margin: 0 auto; padding: 0 2rem 4rem; }
.empty-state { text-align: center; padding: 6rem 2rem; color: var(--muted); }
.empty-state-icon { font-size: 48px; display: block; margin-bottom: 1rem; opacity: 0.4; }
.empty-state p { font-size: 14px; }

.card { position: relative; background: var(--surface); cursor: pointer; overflow: hidden; transition: background 0.25s; animation: cardIn 0.4s ease both; }
.card:hover { background: var(--surface2); }
.card:hover .card-arrow { opacity: 1; transform: translate(0,0); }
.card:hover .card-poster-inner { transform: scale(1.05); }
@keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

.card-poster { height: 180px; overflow: hidden; position: relative; border-bottom: 1.5px solid var(--border); }
.card-poster-inner { width: 100%; height: 100%; transition: transform 0.4s ease; display: flex; align-items: center; justify-content: center; }
.card-poster-inner img { width: 100%; height: 100%; object-fit: cover; }
.card-poster-inner.emoji-mode { font-size: 56px; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5)); }
.card-year-badge { position: absolute; top: 10px; left: 10px; font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; color: rgba(255,255,255,0.6); background: rgba(0,0,0,0.55); padding: 3px 8px; border-radius: 4px; z-index: 2; }
.card-rating { position: absolute; top: 10px; right: 10px; font-size: 11px; color: var(--accent); z-index: 2; background: rgba(0,0,0,0.45); padding: 2px 6px; border-radius: 4px; }

.card-body { padding: 12px 14px 14px; }
.card-genre-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 7px; }
.genre-tag { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.06em; padding: 2px 7px; border-radius: 3px; border: 0.5px solid; }
.gt-劇情  { color:#a89be8; border-color:rgba(168,155,232,.35); background:rgba(168,155,232,.07); }
.gt-動作  { color:#e89b8c; border-color:rgba(232,155,140,.35); background:rgba(232,155,140,.07); }
.gt-喜劇  { color:#9be8b0; border-color:rgba(155,232,176,.35); background:rgba(155,232,176,.07); }
.gt-科幻  { color:#8cb8e8; border-color:rgba(140,184,232,.35); background:rgba(140,184,232,.07); }
.gt-驚悚  { color:#e8d08c; border-color:rgba(232,208,140,.35); background:rgba(232,208,140,.07); }
.gt-愛情  { color:#e89bbf; border-color:rgba(232,155,191,.35); background:rgba(232,155,191,.07); }
.gt-紀錄片{ color:#7ac9b8; border-color:rgba(122,201,184,.35); background:rgba(122,201,184,.07); }
.gt-動畫  { color:#e8a87a; border-color:rgba(232,168,122,.35); background:rgba(232,168,122,.07); }

.card-title { font-size: 18px; font-weight: 700; letter-spacing: -0.01em; margin-bottom: 4px; }
.card-director { font-family: var(--font-mono); font-size: 12px; color: var(--muted); }
.card-arrow { position: absolute; bottom: 14px; right: 14px; font-size: 18px; color: var(--accent); opacity: 0; transform: translate(-4px,4px); transition: all 0.2s; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 2rem; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 2px; max-width: 760px; width: 100%; max-height: 90vh; overflow-y: auto; transform: translateY(24px) scale(0.97); transition: transform 0.3s ease; }
.modal-overlay.open .modal { transform: translateY(0) scale(1); }
.modal-top { height: 260px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; border-bottom: 1.5px solid var(--border); }
.modal-top-bg { position: absolute; inset: 0; opacity: 0.4; }
.modal-top-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.75; }
.modal-top-emoji { font-size: 72px; position: relative; z-index: 1; filter: drop-shadow(0 8px 30px rgba(0,0,0,.6)); }
.modal-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,.55); border: 0.5px solid var(--border2); color: var(--muted); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 16px; z-index: 3; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
.modal-close:hover { color: var(--text); }
.modal-body { padding: 2rem 2.5rem 2.5rem; }
.modal-meta-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 0.75rem; }
.modal-title { font-size: 32px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 6px; line-height: 1.1; }
.modal-rating { color: var(--accent); font-size: 18px; margin-bottom: 0; }
.modal-stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 2px; overflow: hidden; margin: 1.5rem 0; }
.modal-stat { background: var(--surface2); padding: 1rem; text-align: center; }
.modal-stat-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--muted); display: block; margin-bottom: 4px; text-transform: uppercase; }
.modal-stat-val { font-size: 14px; font-weight: 600; }
/* review / long text */
.modal-divider { height: 1px; background: var(--border); margin: 1.75rem 0; }
.modal-review-label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; display: block; }
.modal-review { font-size: 15px; color: rgba(240,237,230,.8); line-height: 2; white-space: pre-wrap; word-break: break-word; }
.modal-desc { font-size: 15px; color: rgba(240,237,230,.75); line-height: 1.8; margin: 1rem 0; border-left: 2px solid var(--accent); padding-left: 1rem; }

/* ══════════════════════════════
   ADMIN
══════════════════════════════ */
.admin-wrap { max-width: 1100px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }
.admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
.admin-title { font-size: 22px; font-weight: 700; }
.admin-title span { font-family: var(--font-mono); font-size: 13px; color: var(--muted); font-weight: 400; margin-left: 10px; }
.btn-primary { background: var(--accent); border: none; border-radius: 6px; padding: 9px 20px; font-family: var(--font-serif); font-size: 13px; font-weight: 600; color: #0a0a0f; cursor: pointer; transition: opacity 0.2s; display: inline-flex; align-items: center; gap: 6px; }
.btn-primary:hover { opacity: 0.85; }
.btn-ghost { background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; padding: 8px 16px; font-family: var(--font-serif); font-size: 13px; color: var(--muted); cursor: pointer; transition: all 0.2s; }
.btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
.btn-danger { background: transparent; border: 0.5px solid rgba(232,122,122,.4); border-radius: 6px; padding: 6px 12px; font-family: var(--font-serif); font-size: 12px; color: var(--danger); cursor: pointer; transition: all 0.2s; }
.btn-danger:hover { background: rgba(232,122,122,.08); }

/* admin list */
.admin-list { display: flex; flex-direction: column; gap: 1px; background: var(--border); border: 0.5px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 2rem; }
.admin-row { background: var(--surface); display: flex; align-items: center; gap: 1rem; padding: 12px 16px; transition: background 0.15s; }
.admin-row:hover { background: var(--surface2); }
.admin-thumb { width: 52px; height: 52px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 26px; border: 0.5px solid var(--border2); }
.admin-thumb img { width: 100%; height: 100%; object-fit: cover; }
.admin-info { flex: 1; min-width: 0; }
.admin-row-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.admin-row-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
.admin-row-genres { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
.admin-row-actions { display: flex; gap: 8px; flex-shrink: 0; }

/* drag handle */
.drag-handle { color: var(--muted); cursor: grab; font-size: 16px; padding: 0 4px; user-select: none; }
.drag-handle:active { cursor: grabbing; }
.admin-row.drag-over { border-top: 2px solid var(--accent); }

/* form modal */
.form-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.88); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); z-index: 300; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
.form-overlay.open { opacity: 1; pointer-events: all; }
.form-box { background: var(--surface); border: 0.5px solid var(--border2); border-radius: 8px; max-width: 680px; width: 100%; max-height: 92vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.25s; }
.form-overlay.open .form-box { transform: translateY(0); }
.form-header { padding: 1.25rem 1.5rem; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.form-header h3 { font-size: 16px; font-weight: 600; }
.form-body { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; }
.form-input, .form-textarea, .form-select {
  background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 6px;
  padding: 9px 12px; font-family: var(--font-serif); font-size: 14px; color: var(--text);
  outline: none; transition: border-color 0.2s; width: 100%;
}
.form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
.form-textarea { resize: vertical; min-height: 90px; line-height: 1.6; }
.form-select option { background: var(--surface2); }
.star-input { display: flex; gap: 6px; }
.star-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--border2); transition: color 0.15s; line-height: 1; padding: 0; }
.star-btn.on { color: var(--accent); }

/* image upload */
.img-upload-area { border: 1px dashed var(--border2); border-radius: 6px; padding: 1.25rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
.img-upload-area:hover, .img-upload-area.drag-active { border-color: var(--accent); background: rgba(232,201,122,0.04); }
.img-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
.img-preview { width: 100%; max-height: 140px; object-fit: cover; border-radius: 4px; margin-bottom: 8px; display: block; }
.img-upload-hint { font-size: 13px; color: var(--muted); }
.img-upload-hint span { color: var(--accent); }
.img-url-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.img-url-row .form-input { flex: 1; }
.or-divider { text-align: center; font-family: var(--font-mono); font-size: 11px; color: var(--muted); margin: 6px 0; }

/* genre checkboxes */
.genre-checks { display: flex; gap: 8px; flex-wrap: wrap; }
.genre-check { display: flex; align-items: center; gap: 5px; }
.genre-check input { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; }
.genre-check label { font-size: 13px; color: var(--muted); cursor: pointer; transition: color 0.15s; }
.genre-check input:checked + label { color: var(--text); }

.form-footer { padding: 1rem 1.5rem; border-top: 0.5px solid var(--border); display: flex; justify-content: flex-end; gap: 10px; }

/* toast */
.toast { position: fixed; bottom: 2rem; right: 2rem; background: var(--surface2); border: 0.5px solid var(--border2); border-radius: 8px; padding: 12px 18px; font-size: 13px; z-index: 500; opacity: 0; transform: translateY(8px); transition: all 0.25s; pointer-events: none; display: flex; align-items: center; gap: 8px; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.success::before { content: '✓'; color: var(--success); font-weight: 700; }
.toast.danger::before { content: '✕'; color: var(--danger); font-weight: 700; }

/* scrollbar */
::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── LOGIN OVERLAY ── -->
<div class="login-overlay" id="loginOverlay">
  <div style="position:absolute;top:1.2rem;left:2rem;font-family:var(--font-mono);font-size:13px;letter-spacing:0.15em;color:var(--accent);cursor:pointer;background:none;border:none;" onclick="cancelLogin()">🎬 CINEMA</div>
  <div class="login-box">
    <div class="login-top">
      <span class="login-icon">🔒</span>
      <h2 class="login-title">後台管理登入</h2>
      <p class="login-sub">Cinema Archive · Admin</p>
    </div>
    <div class="login-body">
      <div class="login-group">
        <label class="login-label" for="loginAc">帳號</label>
        <input class="login-input" type="text" id="loginAc" placeholder="輸入帳號" autocomplete="username">
      </div>
      <div class="login-group">
        <label class="login-label" for="loginPw">密碼</label>
        <input class="login-input" type="password" id="loginPw" placeholder="輸入密碼" autocomplete="current-password">
      </div>
      <p class="login-error" id="loginError"></p>
      <button class="login-btn" onclick="doLogin()">登入</button>
    </div>
    <div class="login-footer">SHA-256 驗證 · 密碼不儲存於任何地方</div>
    <div style="padding:0 2rem 1.5rem;text-align:center">
      <button onclick="cancelLogin()" style="background:none;border:none;font-family:var(--font-mono);font-size:12px;letter-spacing:0.08em;color:var(--muted);cursor:pointer;transition:color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">← 返回首頁</button>
    </div>
  </div>
</div>

<!-- ── NAV ── -->
<nav class="nav">
  <button class="nav-logo" onclick="switchPage('front')">🎬 CINEMA</button>
  <div class="nav-tabs" id="navTabs">
    <button class="nav-tab active" onclick="switchPage('front')">電影展示</button>
    <button class="nav-tab" onclick="goAdmin()">後台管理</button>
  </div>
  <button class="nav-back" id="navBack" onclick="switchPage('front')">← 返回電影展示</button>
</nav>

<!-- ══════════════════════════════
     FRONT PAGE
══════════════════════════════ -->
<div id="page-front" class="page active">
  <header>
    <span class="site-label">Cinema Archive · 電影典藏</span>
    <h1>探索<span>電影</span></h1>
    <p class="header-sub">精選經典與當代佳作，為你的下一個夜晚挑一部好片</p>
    <div class="header-line"></div>
  </header>
  <div class="filters-wrap" id="filtersWrap">
    <span class="filter-label">篩選：</span>
    <button class="filter-btn active" data-genre="all">全部</button>

/* ════════════════════════════
   AUTH

const AC_HASH = '417d26b96d03a64830d613fc075858eae73f4f4219d44a9de3378c6ea2c00c84';
const PW_HASH = '8b87fcdca043ea8d2442463c2756aae60abe6449fd58f6827fb09cfce3b10de0';
let adminUnlocked = false;

async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const ac = document.getElementById('loginAc').value.trim();
  const pw = document.getElementById('loginPw').value;
  const errEl = document.getElementById('loginError');
  if (!ac || !pw) { errEl.textContent = '請輸入帳號和密碼'; return; }
  const [acH, pwH] = await Promise.all([sha256(ac), sha256(pw)]);
  if (acH === AC_HASH && pwH === PW_HASH) {
    adminUnlocked = true;
    document.getElementById('loginOverlay').classList.add('hidden');
    document.getElementById('loginAc').value = '';
    document.getElementById('loginPw').value = '';
    errEl.textContent = '';
    switchPage('admin');
  } else {
    errEl.textContent = '帳號或密碼錯誤';
    document.getElementById('loginPw').value = '';
    // brief shake
    const box = document.querySelector('.login-box');
    box.style.animation = 'none';
    box.style.transform = 'translateX(-8px)';
    setTimeout(() => { box.style.transition = 'transform 0.35s ease'; box.style.transform = ''; }, 10);
    setTimeout(() => { box.style.transition = ''; }, 400);
  }
}

function cancelLogin() {
  document.getElementById('loginOverlay').classList.add('hidden');
  document.getElementById('loginError').textContent = '';
}

function goAdmin() {
  if (adminUnlocked) {
    switchPage('admin');
  } else {
    document.getElementById('loginOverlay').classList.remove('hidden');
    setTimeout(() => document.getElementById('loginAc').focus(), 50);

}

/* ════════════════════════════

const SUPABASE_URL = 'https://ojgsmrxhefjdvivmsnme.supabase.co';
const SUPABASE_KEY = 'sb_publishable_nMfb5hoSPCYq_R865l0smQ_zERoXLVD';

async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': options.prefer || '',
      ...options.headers,
    },
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const GENRES = ["劇情","動作","喜劇","科幻","驚悚","愛情","紀錄片","動畫"];
const COLORS = [
  "linear-gradient(135deg,#2a1a0a,#4a3010)",
  "linear-gradient(135deg,#050a1a,#0a1a35)",
  "linear-gradient(135deg,#0f0f0a,#1a1a10)",
  "linear-gradient(135deg,#1a0505,#2a0f0f)",

let movies = [];

let editingId = null;

async function loadMovies() {
  try {
    const data = await sbFetch('movies?select=*&order=sort_order.asc.nullslast,created_at.asc');

    console.error('載入失敗', e);

async function saveMovieToDB(data, isEdit) {
  const payload = {
    title: data.title,
    year: data.year,
    director: data.director,
    duration: data.duration,
    country: data.country,
    synopsis: data.desc,
    review: data.review,
    genre: data.genre,
    rating: data.rating,
    emoji: data.emoji,
    image: data.image,
    color: data.color,
    sort_order: data.sort_order ?? null,
  };
  if (isEdit) {
    await sbFetch(`movies?id=eq.${data.id}`, {
      method: 'PATCH',
      prefer: 'return=representation',
      body: JSON.stringify(payload),
    });
  } else {
    await sbFetch('movies', {
      method: 'POST',
      prefer: 'return=representation',
      body: JSON.stringify(payload),
    });
  }
}

async function deleteMovieFromDB(id) {
  await sbFetch(`movies?id=eq.${id}`, { method: 'DELETE' });
}

async function updateSortOrder() {
  for (let i = 0; i < movies.length; i++) {
    await sbFetch(`movies?id=eq.${movies[i].id}`, {
      method: 'PATCH',
      body: JSON.stringify({ sort_order: i }),

function switchPage(p) {

  if (p === 'front') { renderFilters(); renderGrid(); }
  if (p === 'admin') { loadMovies().then(() => renderAdmin()); }

/* ════════════════════════════
   FRONT
════════════════════════════ */
function stars(n) {
  return Array.from({length:5}, (_,i) => `<span style="opacity:${i<n?1:0.2}">★</span>`).join('');
}

function renderFilters() {
  const usedGenres = [...new Set(movies.flatMap(m => m.genre))].sort();
  const wrap = document.getElementById('filtersWrap');
  wrap.innerHTML = `<span class="filter-label">篩選：</span>
    <button class="filter-btn ${currentGenre==='all'?'active':''}" data-genre="all">全部</button>
    ${usedGenres.map(g => `<button class="filter-btn ${currentGenre===g?'active':''}" data-genre="${g}">${g}</button>`).join('')}`;
  wrap.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      currentGenre = btn.dataset.genre;
      renderFilters(); renderGrid();
    });
  });
}

function posterHTML(m, cls='') {
  if (m.image) return `<img src="${m.image}" alt="${m.title}" class="${cls}" onerror="this.style.display='none'">`;
  return `<span class="${cls} emoji-mode">${m.emoji || '🎬'}</span>`;
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const list = currentGenre === 'all' ? movies : movies.filter(m => m.genre.includes(currentGenre));
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="empty-state-icon">🎞</span><p>尚無電影，請到後台新增</p></div>`;
    return;
  }
  grid.innerHTML = list.map((m, i) => `
    <article class="card" style="animation-delay:${i*0.05}s" onclick="openModal(${m.id})">
      <div class="card-poster">
        <div class="card-poster-inner ${!m.image ? 'emoji-mode' : ''}" style="${!m.image ? `background:${m.color||COLORS[0]}` : ''}">
          ${m.image ? `<img src="${m.image}" alt="${m.title}" style="width:100%;height:100%;object-fit:contain;background:#000">` : (m.emoji || '🎬')}
        </div>
        <span class="card-year-badge">${m.year||''}</span>
        <span class="card-rating">${stars(m.rating||5)}</span>
      </div>
      <div class="card-body">
        <div class="card-genre-row">${(m.genre||[]).map(g=>`<span class="genre-tag gt-${g}">${g}</span>`).join('')}</div>
        <h2 class="card-title">${m.title}</h2>
        <p class="card-director">${m.director ? '導演：'+m.director : ''}</p>
      </div>
      <span class="card-arrow">→</span>
    </article>`).join('');
}

function openModal(id) {
  const m = movies.find(x => x.id === id);
  if (!m) return;
  const modal = document.getElementById('modal');
  const reviewBlock = m.review ? `
    <div class="modal-divider"></div>
    <span class="modal-review-label">影評</span>
    <div class="modal-review">${m.review.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>` : '';
  const descBlock = m.desc ? `<p class="modal-desc">${m.desc}</p>` : '';
  modal.innerHTML = `
    <div class="modal-top">
      ${m.image
        ? `<img src="${m.image}" alt="${m.title}" class="modal-top-img" style="object-fit:contain;background:#000">`
        : `<div class="modal-top-bg" style="background:${m.color||COLORS[0]}"></div><span class="modal-top-emoji">${m.emoji||'🎬'}</span>`
      }
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-meta-row">${(m.genre||[]).map(g=>`<span class="genre-tag gt-${g}">${g}</span>`).join('')}<span style="font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-left:auto">${m.year||''}</span></div>
      <h2 class="modal-title">${m.title}</h2>
      <div class="modal-rating">${stars(m.rating||5)}</div>
      ${descBlock}
      <div class="modal-stats">
        <div class="modal-stat"><span class="modal-stat-label">導演</span><span class="modal-stat-val">${m.director||'—'}</span></div>
        <div class="modal-stat"><span class="modal-stat-label">片長</span><span class="modal-stat-val">${m.duration||'—'}</span></div>
        <div class="modal-stat"><span class="modal-stat-label">出品國</span><span class="modal-stat-val">${m.country||'—'}</span></div>
      </div>
      ${reviewBlock}
    </div>`;
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target === document.getElementById('modalOverlay')) closeModal(); });

   ADMIN
════════════════════════════ */
function renderAdmin() {
  document.getElementById('movieCount').textContent = `共 ${movies.length} 部`;
  const list = document.getElementById('adminList');
  if (!movies.length) {
    list.innerHTML = `<div style="padding:2.5rem;text-align:center;color:var(--muted);font-size:14px">尚無電影 · 點擊「新增電影」開始</div>`;
    return;
  }
  list.innerHTML = movies.map((m, i) => `
    <div class="admin-row" draggable="true" data-id="${m.id}" data-index="${i}">
      <span class="drag-handle" title="拖曳排序">⠿</span>
      <div class="admin-thumb">
        ${m.image ? `<img src="${m.image}" alt="">` : (m.emoji||'🎬')}
      </div>
      <div class="admin-info">
        <div class="admin-row-title">${m.title}</div>
        <div class="admin-row-meta">${[m.year, m.director].filter(Boolean).join(' · ')}</div>
        <div class="admin-row-genres">${(m.genre||[]).map(g=>`<span class="genre-tag gt-${g}" style="font-size:9px">${g}</span>`).join('')}</div>
      </div>

        <button class="btn-ghost" style="font-size:12px;padding:5px 12px" onclick="openForm(${m.id})">編輯</button>
        <button class="btn-danger" onclick="deleteMovie(${m.id})">刪除</button>
      </div>
    </div>`).join('');
  initDrag();
}

/* drag sort */
let dragSrc = null;
function initDrag() {
  const rows = document.querySelectorAll('.admin-row');
  rows.forEach(row => {
    row.addEventListener('dragstart', e => { dragSrc = row; e.dataTransfer.effectAllowed = 'move'; });
    row.addEventListener('dragover', e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      if (dragSrc === row) return;
      const fromIdx = parseInt(dragSrc.dataset.index);
      const toIdx = parseInt(row.dataset.index);
      const [moved] = movies.splice(fromIdx, 1);
      movies.splice(toIdx, 0, moved);
      renderAdmin();
      updateSortOrder().then(() => toast('排序已更新')).catch(() => toast('排序儲存失敗','danger'));
    });
  });
}

async function deleteMovie(id) {
  if (!confirm('確定刪除這部電影？')) return;
  try {
    await deleteMovieFromDB(id);
    movies = movies.filter(m => m.id !== id);
    renderAdmin();
    toast('已刪除', 'danger');
  } catch(e) {
    toast('刪除失敗', 'danger');
  }
}

/* ════════════════════════════
   FORM
════════════════════════════ */
function buildGenreChecks(selected=[]) {
  document.getElementById('genreChecks').innerHTML = GENRES.map(g =>
    `<label class="genre-check"><input type="checkbox" value="${g}" ${selected.includes(g)?'checked':''}><label>${g}</label></label>`
  ).join('');
}

function setStar(n) {
  currentRating = n;
  document.querySelectorAll('.star-btn').forEach(b => {
    b.classList.toggle('on', parseInt(b.dataset.v) <= n);
  });
}

function openForm(id = null) {
  editingId = id;
  currentImgData = null;
  document.getElementById('formTitle').textContent = id ? '編輯電影' : '新增電影';
  const m = id ? movies.find(x => x.id === id) : null;

  // reset
  document.getElementById('fTitle').value = m?.title || '';
  document.getElementById('fYear').value = m?.year || '';
  document.getElementById('fDirector').value = m?.director || '';
  document.getElementById('fDuration').value = m?.duration || '';
  document.getElementById('fCountry').value = m?.country || '';
  document.getElementById('fDesc').value = m?.synopsis || m?.desc || '';
  document.getElementById('fReview').value = m?.review || '';
  document.getElementById('imgUrl').value = '';
  document.getElementById('imgEmoji').value = m?.emoji || '';
  setStar(m?.rating || 5);
  buildGenreChecks(m?.genre || []);

  const preview = document.getElementById('imgPreview');
  const wrap = document.getElementById('imgPreviewWrap');
  if (m?.image) {
    preview.src = m.image;
    wrap.style.display = 'block';
    document.getElementById('imgUrl').value = m.image;
    currentImgData = m.image;
  } else {
    preview.src = '';
    wrap.style.display = 'none';
    document.getElementById('imgUrl').value = '';
  }

  document.getElementById('formOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeForm() {
  document.getElementById('formOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function applyImgUrl() {
  const url = document.getElementById('imgUrl').value.trim();
  if (!url) return;
  currentImgData = url;
  const preview = document.getElementById('imgPreview');
  const wrap = document.getElementById('imgPreviewWrap');
  preview.src = url;
  wrap.style.display = 'block';
}

function clearImg() {
  currentImgData = null;
  document.getElementById('imgUrl').value = '';
  document.getElementById('imgPreview').src = '';
  document.getElementById('imgPreviewWrap').style.display = 'none';
}

async function saveMovie() {
  const title = document.getElementById('fTitle').value.trim();
  if (!title) { toast('請輸入片名', 'danger'); return; }

  const genres = [...document.querySelectorAll('#genreChecks input:checked')].map(i => i.value);
  const colorIdx = Math.floor(Math.random() * COLORS.length);
  const isEdit = !!editingId;

  const data = {
    id: editingId || undefined,
    title,
    year: document.getElementById('fYear').value.trim(),
    director: document.getElementById('fDirector').value.trim(),
    duration: document.getElementById('fDuration').value.trim(),
    country: document.getElementById('fCountry').value.trim(),
    desc: document.getElementById('fDesc').value.trim(),
    review: document.getElementById('fReview').value.trim(),
    genre: genres.length ? genres : ['劇情'],
    rating: currentRating,
    emoji: document.getElementById('imgEmoji').value.trim() || '🎬',
    image: currentImgData || null,
    color: isEdit ? (movies.find(m=>m.id===editingId)?.color || COLORS[colorIdx]) : COLORS[colorIdx],
  };

  try {
    await saveMovieToDB(data, isEdit);
    await loadMovies();
    closeForm();
    toast(isEdit ? '已更新' : '已新增');
    if (adminUnlocked) renderAdmin();
  } catch(e) {
    console.error(e);
    toast('儲存失敗：' + e.message, 'danger');
  }
}

/* ════════════════════════════
   TOAST
════════════════════════════ */
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 2200);
}

document.getElementById('grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><span class="empty-state-icon" style="animation:spin 1s linear infinite;display:inline-block">⟳</span><p>載入中…</p></div>`;
document.getElementById('filtersWrap').innerHTML = `<span class="filter-label">載入中…</span>`;
loadMovies();
</script>
